<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gaussian Splat Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d0d12;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    #canvas {
      width: 100%;
      height: 100%;
      display: block;
      cursor: grab;
    }
    #canvas:active { cursor: grabbing; }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.3s;
    }
    #overlay.drag-active {
      background: rgba(80, 120, 255, 0.1);
      border: 2px dashed rgba(80, 120, 255, 0.4);
    }

    .drop-zone {
      text-align: center;
      padding: 60px;
      border: 2px dashed rgba(255,255,255,0.15);
      border-radius: 16px;
      pointer-events: all;
      backdrop-filter: blur(10px);
      background: rgba(20, 20, 30, 0.8);
    }

    .drop-zone h1 {
      font-size: 1.5em;
      font-weight: 500;
      margin-bottom: 12px;
      color: #fff;
    }

    .drop-zone p {
      color: #888;
      margin-bottom: 20px;
    }

    #file-btn {
      background: rgba(80, 120, 255, 0.2);
      border: 1px solid rgba(80, 120, 255, 0.4);
      color: #7aa2ff;
      padding: 10px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.95em;
      pointer-events: all;
      transition: background 0.2s;
    }
    #file-btn:hover {
      background: rgba(80, 120, 255, 0.35);
    }

    #stats {
      position: fixed;
      top: 12px;
      right: 16px;
      background: rgba(0,0,0,0.6);
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85em;
      font-variant-numeric: tabular-nums;
      color: #aaa;
      display: none;
      z-index: 20;
    }

    #status {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.7);
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 0.9em;
      display: none;
      z-index: 20;
    }

    #overlay-panel-wrap {
      position: fixed;
      top: 12px;
      left: 16px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 8px;
      padding: 10px 14px;
      z-index: 20;
      min-width: 140px;
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    #overlay-panel-header {
      font-size: 0.8em;
      font-weight: 600;
      color: #aaa;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    #overlay-panel label {
      font-size: 0.85em;
      color: #ccc;
    }

    #overlay-panel input[type="checkbox"] {
      accent-color: #5078ff;
    }

    .controls-hint {
      position: fixed;
      bottom: 12px;
      right: 16px;
      font-size: 0.75em;
      color: #555;
      z-index: 20;
    }

    .loading-text, .error-text {
      font-size: 1.2em;
      color: #888;
    }
    .error-text { color: #f66; }

    .toast {
      position: fixed;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: rgba(30, 30, 40, 0.95);
      border: 1px solid rgba(255, 200, 50, 0.4);
      color: #ffd666;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 0.85em;
      z-index: 100;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      max-width: 500px;
      text-align: center;
      backdrop-filter: blur(10px);
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast-warning { border-color: rgba(255, 200, 50, 0.4); color: #ffd666; }
    .toast-info { border-color: rgba(80, 120, 255, 0.4); color: #7aa2ff; }

    .heatmap-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: #999;
      padding: 4px 10px;
      border-radius: 4px;
      font-size: 0.8em;
      cursor: pointer;
      margin-right: 4px;
    }
    .heatmap-btn.active {
      background: rgba(80, 120, 255, 0.25);
      border-color: rgba(80, 120, 255, 0.5);
      color: #7aa2ff;
    }

    .file-browser {
      margin-top: 24px;
      width: 100%;
      max-width: 400px;
    }

    .file-browser-header {
      font-size: 0.8em;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 8px;
      text-align: left;
    }

    .file-list {
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.3);
    }

    .file-list::-webkit-scrollbar {
      width: 6px;
    }
    .file-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.15);
      border-radius: 3px;
    }

    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      cursor: pointer;
      transition: background 0.15s;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      text-align: left;
    }
    .file-item:last-child { border-bottom: none; }
    .file-item:hover {
      background: rgba(80, 120, 255, 0.12);
    }

    .file-item-name {
      font-size: 0.9em;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-item-path {
      font-size: 0.72em;
      color: #666;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-item-size {
      font-size: 0.78em;
      color: #666;
      white-space: nowrap;
      margin-left: 12px;
      flex-shrink: 0;
    }

    .file-list-empty {
      padding: 16px;
      text-align: center;
      color: #555;
      font-size: 0.85em;
    }

    .file-list-loading {
      padding: 16px;
      text-align: center;
      color: #666;
      font-size: 0.85em;
    }

    .or-divider {
      color: #555;
      font-size: 0.85em;
      margin: 16px 0 4px;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div id="overlay">
    <div class="drop-zone">
      <h1>Gaussian Splat Viewer</h1>
      <p>Drop a .ply or .splat file here</p>
      <button id="file-btn">Choose File</button>

      <div class="file-browser">
        <div class="or-divider">or load from server</div>
        <div class="file-browser-header">Available Splats</div>
        <div id="file-list" class="file-list">
          <div class="file-list-loading">Scanning...</div>
        </div>
      </div>
    </div>
  </div>

  <div id="stats"></div>
  <div id="status"></div>

  <div id="overlay-panel-wrap">
    <div id="overlay-panel-header">Overlays</div>
    <div id="overlay-panel"></div>
  </div>

  <div class="controls-hint">
    LMB: orbit &nbsp; RMB: pan &nbsp; Scroll: zoom &nbsp; Click box: select &nbsp; Drag face: resize &nbsp; ESC: deselect
  </div>

  <script type="module" src="./src/main.ts"></script>
</body>
</html>
